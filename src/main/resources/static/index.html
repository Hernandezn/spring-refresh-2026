<!DOCTYPE html>

<html>
	<head>
		<title>Spring Boot REST Service</title>
		
		<style>
			body {
				background-color: black;
				color: lime;
			}
			
			#test-output {
				border: 2px grey inset;
				padding: 0.5rem;
				display: inline-block;
				color: cyan;
			}
			
			#screenshot-api-output {
				text-align: center;
			}
			
			#screenshot-api-output > img {
				max-width: 90%;
			}
		</style>
	</head>
	<body>
		<h1>
			This server hosts a demonstration REST API.
		</h1>
		<p>
			There are currently no other HTML pages, only API endpoints that return data. 
			This page is a sample frontend to demonstrate API responses in a live Web browser.
		</p>
		
		<p>
			/test endpoint:
			
			<p id="test-output"></p>
		</p>
		
		
		
		<p>
			<form id="screenshot-api-input-form">
				<label for="screenshot-api-text-input">
					Enter a URL to receive a screenshot of it through my <code>/screenshot</code> api: 
				</label>
				<input type="text" id="screenshot-api-text-input" placeholder="google.com" />
				
				<button type="submit">Submit</button>
			</form>
			<br />
			<div id="screenshot-api-output"></div>
		</p>
		
		<script>
			{
				const testOutput = document.getElementById('test-output');
				
				async function getTestOutput() {
					const res = await fetch('/test');
					
					// const dataObject = await res.json();
					
					testOutput.innerText = await res.text();
				}
				
				getTestOutput();
			}
			
			{
				const screenshotInputForm = document.getElementById('screenshot-api-input-form');
				const screenshotTextInput = document.getElementById('screenshot-api-text-input');
				const screenshotOutput = document.getElementById('screenshot-api-output');
				const screenshot = document.createElement('img');
				
				function displayScreenshotApiOutput() {
					screenshot.src = `/screenshot?url=${screenshotTextInput.value}`;
					
					screenshotOutput.appendChild(screenshot);
				};
				
				screenshotInputForm.addEventListener('submit', (submitEvent) => {
					submitEvent.preventDefault();
					displayScreenshotApiOutput();
				});
			}
		</script>
	</body>
</html>
